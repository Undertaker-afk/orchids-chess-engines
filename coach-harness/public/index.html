<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trinity Coach Harness</title>
  <style>
    body { font-family: ui-sans-serif, Segoe UI, Arial, sans-serif; margin: 0; background: #0b1220; color: #e7ecf5; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
    .card { background: #131d33; border: 1px solid #2c3a5b; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { display: block; font-size: 12px; color: #aeb9cf; margin-bottom: 4px; }
    input, select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #33456d; background: #0d1528; color: #e7ecf5; }
    button { padding: 10px 14px; border-radius: 8px; border: 0; background: #3c7df3; color: white; cursor: pointer; font-weight: 600; }
    pre { background: #0d1528; border: 1px solid #33456d; border-radius: 8px; padding: 12px; overflow: auto; }
    .mono { font-family: ui-monospace, Menlo, Consolas, monospace; white-space: pre-wrap; }
    .row { display: flex; gap: 10px; align-items: center; }
    .board-wrap { display: inline-grid; border: 1px solid #33456d; border-radius: 8px; overflow: hidden; }
    .board-row { display: grid; grid-template-columns: repeat(8, 44px); }
    .sq { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .sq.light { background: #f0d9b5; color: #2a2a2a; }
    .sq.dark { background: #b58863; color: #111; }
    .coords { margin-top: 8px; font-size: 12px; color: #aeb9cf; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Trinity vs Stockfish Coach Harness</h1>

    <div class="card">
      <div class="grid">
        <div>
          <label>Modular Engine Path</label>
          <input id="enginePath" />
        </div>
        <div>
          <label>Stockfish Path</label>
          <input id="stockfishPath" />
        </div>
        <div>
          <label>Move Time (ms)</label>
          <input id="movetimeMs" type="number" />
        </div>
        <div>
          <label>Max Plies</label>
          <input id="maxPlies" type="number" />
        </div>
        <div>
          <label>Coach Every N Plies</label>
          <input id="coachEveryNPlies" type="number" />
        </div>
        <div>
          <label>Coach Enabled</label>
          <select id="coachEnabled">
            <option value="true">true</option>
            <option value="false">false</option>
          </select>
        </div>
      </div>
      <div class="row" style="margin-top:12px;">
        <button id="startBtn">Start Match</button>
        <span id="meta"></span>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Match State</h3>
        <div id="state"></div>
        <h3>Board</h3>
        <div id="board"></div>
        <h3>Board (FEN)</h3>
        <pre id="fen" class="mono"></pre>
      </div>
      <div class="card">
        <h3>Coach Insights (every N plies)</h3>
        <pre id="insights" class="mono"></pre>
      </div>
    </div>

    <div class="card">
      <h3>Moves</h3>
      <pre id="moves" class="mono"></pre>
    </div>
  </div>

  <script src="/ui.js" defer></script>
</body>
</html>
